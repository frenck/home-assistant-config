---
# The Google Text-to-Speech platform use Google Text-to-Speech engine to
# read a text with a natural sounding voice(s).
#
# https://www.home-assistant.io/integrations/google_translate/
#
# NOTE: I actually do not use this one. It also just gets imported to the UI.
# However, this way of setting up, allows for caching the cache directory :)
#
tts:
  - platform: google_translate

    # Path to a location for caching the tts files.
    cache_dir: /tmp/tts
